
<div class="list"
infinite-scroll
[infiniteScrollDistance]="2"
[infiniteScrollThrottle]="100"
(scrolled)="onScroll()">
    <input class="form-control" type="text" placeholder="Search card" [formControl]="cardText">
    <div class="cards">
       <app-card *ngFor="let card of cards" [card]="card"></app-card>
    </div>  
</div>
